<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet Nadir — Seamless Computing</title>
  <meta name="description"
    content="Velvet Nadir seamless computing dashboard — mesh topology, memory graph, and stream logs." />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div id="app">
    <main class="main-content">

      <!-- ── Floating Navigation (two separate bars) ────── -->
      <div class="floating-nav-wrapper" id="floating-nav">
        <!-- ── Left Taskbar for Minimized Popups ───── -->
        <div id="left-taskbar" class="floating-nav left-taskbar"></div>

        <nav class="floating-nav floating-nav--pages">
          <button class="nav-item active" data-view="mesh" id="nav-mesh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="16" y="16" width="6" height="6" rx="1" />
              <rect x="2" y="16" width="6" height="6" rx="1" />
              <rect x="9" y="2" width="6" height="6" rx="1" />
              <path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3" />
              <path d="M12 12V8" />
            </svg>
            <span>Zenoh Fabric</span>
          </button>
          <button class="nav-item" data-view="memory" id="nav-memory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3" />
              <path d="M3 5V19A9 3 0 0 0 21 19V5" />
              <path d="M3 12A9 3 0 0 0 21 12" />
            </svg>
            <span>Jing</span>
          </button>
          <button class="nav-item" data-view="logs" id="nav-logs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2" />
            </svg>
            <span>Noise</span>
          </button>
        </nav>
        <nav class="floating-nav floating-nav--actions" id="nav-actions-bar">
          <button class="nav-item nav-item--icon nav-fabric-only" id="nav-add" title="New Context or Project">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
          </button>
          <button class="nav-item nav-item--icon nav-fabric-only" id="nav-delete" title="Delete Contexts/Projects">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            </svg>
          </button>
          <div class="memory-view__search" id="jing-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input type="text" placeholder="Search semantic memory..." />
          </div>
          <button class="nav-item nav-item--icon" id="nav-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
          <div id="bridge-status" class="bridge-status bridge-status--offline">
            <span class="bridge-status__dot"></span>
            <span class="bridge-status__label">MOCK</span>
          </div>

          <!-- Popout panels (slide down from this bar) -->
          <div class="add-dropdown" id="add-dropdown">
            <button class="add-dropdown__item" id="add-context-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 8v8" />
                <path d="M8 12h8" />
              </svg>
              New Context
            </button>
            <button class="add-dropdown__item" id="add-project-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" />
              </svg>
              New Project
            </button>
          </div>

          <div class="delete-panel" id="delete-panel">
            <p class="delete-panel__text">Select for deletion</p>
            <div class="delete-panel__actions">
              <button class="delete-panel__btn delete-panel__btn--cancel" id="delete-cancel">Cancel</button>
              <button class="delete-panel__btn delete-panel__btn--confirm" id="delete-confirm">Confirm Delete</button>
            </div>
          </div>

          <div class="settings-dropdown" id="settings-panel">
            <div class="settings-section">
              <div class="settings-section__title">Theme Colors</div>
              <div class="settings-color-row">
                <label class="settings-color">
                  <span>C1</span>
                  <div class="color-picker-wrap"><input type="color" id="color-c1" value="#00d4ff" /></div>
                </label>
                <label class="settings-color">
                  <span>C2</span>
                  <div class="color-picker-wrap"><input type="color" id="color-c2" value="#444444" /></div>
                </label>
                <label class="settings-color">
                  <span>C3</span>
                  <div class="color-picker-wrap"><input type="color" id="color-c3" value="#ff44aa" /></div>
                </label>
              </div>
            </div>
            <div class="settings-section">
              <div class="settings-section__title">Appearance</div>
              <label class="settings-toggle">
                <span>Light Mode</span>
                <input type="checkbox" id="theme-toggle" />
                <div class="toggle-track">
                  <div class="toggle-thumb"></div>
                </div>
              </label>
            </div>
          </div>
        </nav>
      </div>

      <!-- ── View Container ───────────────────────────────── -->
      <div class="view-container">

        <!-- ═══ MESH VIEW ═══════════════════════════════════ -->
        <div class="view-panel active" id="view-mesh">
          <div class="mesh-view" id="mesh-view">
            <div class="mesh-canvas-wrapper" id="mesh-canvas-wrapper">
              <div class="mesh-canvas" id="mesh-canvas">
                <!-- Canvas animation layer -->
                <canvas class="mesh-connections-canvas" id="mesh-connections-canvas"></canvas>
                <!-- SVG connections layer (fallback) -->
                <svg class="mesh-connections" id="mesh-connections" style="display:none;"></svg>
                <!-- Context cards and device nodes are rendered by JS -->
              </div>
            </div>



            <!-- Device Detail Panel (hidden, slides in from right) -->
            <div class="detail-panel detail-panel--device" id="device-panel">
              <div class="detail-panel__header">
                <div class="device-detail__header-row">
                  <div class="device-detail__icon-badge" id="dev-panel-badge">
                    <svg id="dev-panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round">
                      <rect width="18" height="18" x="3" y="3" rx="2" />
                      <path d="M11 9h4a2 2 0 0 1 2 2v4" />
                      <circle cx="9" cy="12" r="2" />
                    </svg>
                  </div>
                  <div>
                    <h2 id="dev-panel-name">—</h2>
                    <p class="text-sm"
                      style="color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;"
                      id="dev-panel-type">— NODE</p>
                    <div class="device-detail__id" id="dev-panel-id">—</div>
                  </div>
                </div>
                <button class="detail-panel__close" id="dev-panel-close">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                  </svg>
                </button>
              </div>
              <div class="device-detail__body" id="dev-panel-body">
                <!-- Rendered by JS -->
              </div>
            </div>

          </div>
        </div>

        <!-- ═══ MEMORY VIEW ═════════════════════════════════ -->
        <div class="view-panel" id="view-memory">
          <div class="memory-view">
            <div class="memory-view__header" style="padding: 1rem 1.5rem; display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid var(--border);">
              <h2 class="logs-view__title" style="margin: 0; padding: 0;">Jing Memory</h2>
              <input type="text" id="jing-search-input" placeholder="Semantic search..." style="flex: 1; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--text);">
              <button id="jing-search-btn" class="remote-ctrl-btn remote-ctrl-btn--neutral" style="flex:0;padding:6px 12px;">Search</button>
            </div>
            <div class="memory-view__graph-area" style="height: calc(100% - 60px);">
              <div id="memory-graph" style="width:100%;height:100%;background:var(--bg);overflow:hidden;">
              </div>
              <div class="memory-view__legend">
                <div class="memory-view__legend-item"><span class="memory-view__legend-dot"
                    style="background:#10b981"></span> Person</div>
                <div class="memory-view__legend-item"><span class="memory-view__legend-dot"
                    style="background:#f59e0b"></span> Project</div>
                <div class="memory-view__legend-item"><span class="memory-view__legend-dot"
                    style="background:#3b82f6"></span> Material</div>
                <div class="memory-view__legend-item"><span class="memory-view__legend-dot"
                    style="background:#8b5cf6"></span> Location</div>
                <div class="memory-view__legend-item"><span class="memory-view__legend-dot"
                    style="background:#ef4444"></span> Event</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ═══ LOGS VIEW ═══════════════════════════════════ -->
        <div class="view-panel" id="view-logs">
          <div class="logs-view">
            <div class="logs-view__header">
              <h2 class="logs-view__title">Stream Logs</h2>
              <div class="logs-view__actions">
                <button class="remote-ctrl-btn remote-ctrl-btn--neutral"
                  style="flex:0;padding:6px 12px;font-size:0.75rem;">Filter</button>
                <button id="export-logs-btn" class="remote-ctrl-btn remote-ctrl-btn--neutral"
                  style="flex:0;padding:6px 12px;font-size:0.75rem;">Export</button>
              </div>
            </div>
            <div class="logs-view__container" id="logs-container">
              <!-- Log entries rendered by JS -->
            </div>
          </div>
        </div>

      </div>

      <!-- ── Agent Orb (barebones placeholder) ─────────────── -->
      <button class="agent-orb-btn" id="agent-orb-btn">
        <!-- Brain icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
          <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
          <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
          <path d="M17.599 6.5a3 3 0 0 0 .399-1.375" />
          <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
          <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
          <path d="M19.938 10.5a4 4 0 0 1 .585.396" />
          <path d="M6 18a4 4 0 0 1-1.967-.516" />
          <path d="M19.967 17.484A4 4 0 0 1 18 18" />
        </svg>
      </button>

      <!-- ── Agent Chat Panel ─────────────────────────────── -->
      <div class="agent-chat" id="agent-chat">
        <div class="agent-chat__header">
          <div class="agent-chat__header-left">
            <div class="agent-chat__avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
              </svg>
            </div>
            <div>
              <div class="agent-chat__title">Velvet Agent</div>
              <div class="agent-chat__status" id="agent-chat-status">Idle</div>
            </div>
          </div>
          <button class="agent-chat__close" id="agent-chat-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div class="agent-chat__messages" id="agent-chat-messages">
          <!-- Messages rendered by JS -->
        </div>
        <div class="agent-chat__input">
          <div class="agent-chat__input-row">
            <button class="agent-chat__mic" id="agent-chat-mic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" x2="12" y1="19" y2="22" />
              </svg>
            </button>
            <div class="agent-chat__input-wrap">
              <input type="text" placeholder="Ask Velvet..." id="agent-chat-input" />
              <button class="agent-chat__send" id="agent-chat-send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="m22 2-7 20-4-9-9-4Z" />
                  <path d="m22 2-11 11" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Ops Mesh Popup Modal -->
      <div class="ops-mesh-modal" id="ops-mesh-modal">
        <div class="ops-mesh-modal__backdrop" onclick="toggleOpsMeshSize()"></div>
        <div class="ops-mesh-modal__content">
          <div class="ops-mesh-modal__header">
            <span>Live Operations Mesh — Expanded</span>
            <button class="detail-panel__close" onclick="toggleOpsMeshSize()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div class="ops-mesh-modal__body">
            <div class="ops-mesh__container" id="ops-mesh-modal-container">
              <div class="ops-mesh__lines" id="ops-mesh-modal-lines"></div>
              <div id="ops-mesh-modal-entities"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Global Tooltip -->
      <div id="velvet-tooltip" class="velvet-tooltip"></div>

    </main>
  </div>

  <!-- Scripts -->
  <script src="lib/d3.min.js"></script>
  <script type="module" src="data.js"></script>
  <script type="module" src="ws-bridge.js"></script>
  <script type="module" src="memory-graph.js"></script>
  <script type="module" src="agent-orb.js"></script>
  <script type="module" src="app.js"></script>

</body>

</html>
